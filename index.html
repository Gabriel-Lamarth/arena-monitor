<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SENTINEL v1.1 | Telemetry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: monospace; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 15px; border-radius: 4px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto space-y-4">
        <div class="flex justify-between items-center border-b border-gray-800 pb-2">
            <h1 class="text-xl font-bold text-blue-500">SENTINEL V1.1</h1>
            <div id="regime" class="text-xs font-bold px-2 py-1 rounded bg-gray-800">SYNC...</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="card"><p class="text-[10px] text-gray-500">COINS</p><div id="coins" class="text-xl font-bold">---</div></div>
            <div class="card"><p class="text-[10px] text-gray-500">GLUES</p><div id="glues" class="text-xl font-bold text-blue-400">---</div></div>
            <div class="card"><p class="text-[10px] text-gray-500">AVG PRICE</p><div id="avg" class="text-xl font-bold text-yellow-500">---</div></div>
            <div class="card"><p class="text-[10px] text-gray-500">RSI</p><div id="rsi" class="text-xl font-bold">---</div></div>
        </div>

        <div class="card h-80"><canvas id="chart"></canvas></div>

        <div class="card overflow-y-auto max-h-60 text-xs" id="log"></div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyCafWPTpVdi1WRIIXOmDTl7xqOzlXkkwz0",
            databaseURL: "https://arenasentinel-cc345-default-rtdb.firebaseio.com",
            projectId: "arenasentinel-cc345"
        };
        firebase.initializeApp(config);
        const db = firebase.database();

        const ctx = document.getElementById('chart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(100).fill(''), datasets: [
                { label: 'Price', data: [], borderColor: '#fff', borderWidth: 2, pointRadius: 0 },
                { label: 'Upper', data: [], borderColor: 'rgba(255,0,0,0.2)', borderWidth: 1, pointRadius: 0 },
                { label: 'Lower', data: [], borderColor: 'rgba(0,255,0,0.2)', borderWidth: 1, pointRadius: 0 }
            ]},
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { position: 'right' } }, plugins: { legend: { display: false } } }
        });

        db.ref('sentinel_monitor').on('value', (snap) => {
            const d = snap.val(); if(!d) return;
            document.getElementById('coins').innerText = d.coins.toLocaleString();
            document.getElementById('glues').innerText = d.glues.toFixed(2);
            document.getElementById('avg').innerText = d.avgPrice > 0 ? d.avgPrice.toFixed(0) : "0";
            document.getElementById('rsi').innerText = d.rsi;
            
            const reg = document.getElementById('regime');
            reg.innerText = d.regime;
            reg.style.color = d.regime === 'BULL' ? '#4ade80' : '#f87171';

            const add = (i, v) => { chart.data.datasets[i].data.push(v); if(chart.data.datasets[i].data.length > 100) chart.data.datasets[i].data.shift(); };
            add(0, d.price); add(1, d.bands.top); add(2, d.bands.bot);
            chart.update('none');

            document.getElementById('log').innerHTML = d.history.map(t => `
                <div class="flex justify-between border-b border-gray-900 py-1">
                    <span class="${t.type === 'BUY' ? 'text-green-500' : 'text-red-500'}">${t.type}</span>
                    <span>${t.q} @ ${t.p.toLocaleString()}</span>
                    <span class="text-gray-600">${t.t}</span>
                </div>
            `).reverse().join('');
        });
    </script>
</body>
</html>
