<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SENTINEL | Adaptive Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 1rem; }
        .status-badge { padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto space-y-4">
        <div class="flex justify-between items-center border-b border-[#30363d] pb-4">
            <h1 class="text-xl font-bold">Sentinel <span class="text-blue-400">v24.0</span></h1>
            <div id="regime" class="status-badge bg-gray-700 text-white uppercase">Sincronizando...</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
            <div class="card"><p class="text-xs text-gray-400">MOEDAS</p><div id="moedas" class="text-2xl font-bold">---</div></div>
            <div class="card"><p class="text-xs text-gray-400">GLUES</p><div id="glues" class="text-2xl font-bold text-blue-400">---</div></div>
            <div class="card"><p class="text-xs text-gray-400">PREÇO ATUAL</p><div id="preco" class="text-2xl font-bold">---</div></div>
        </div>

        <div class="card h-80">
            <canvas id="marketChart"></canvas>
        </div>

        <div class="card">
            <h2 class="text-xs font-bold mb-3 text-gray-400">HISTÓRICO ADAPTATIVO</h2>
            <div id="log" class="space-y-2 font-mono text-xs overflow-y-auto max-h-40"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCafWPTpVdi1WRIIXOmDTl7xqOzlXkkwz0",
            databaseURL: "https://arenasentinel-cc345-default-rtdb.firebaseio.com",
            projectId: "arenasentinel-cc345",
            appId: "1:839795085957:web:ac787cc883563d40960fec"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const ctx = document.getElementById('marketChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(200).fill(''), datasets: [{ data: [], borderColor: '#58a6ff', pointRadius: 0, fill: true, backgroundColor: 'rgba(88,166,255,0.05)', tension: 0.2 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { position: 'right', grid: { color: '#21262d' } } }, plugins: { legend: { display: false } } }
        });

        db.ref('monitor').on('value', (snap) => {
            const d = snap.val(); if(!d) return;
            document.getElementById('moedas').innerText = d.moedas.toLocaleString();
            document.getElementById('glues').innerText = d.glues.toFixed(2);
            document.getElementById('preco').innerText = d.precoAtual.toLocaleString();
            
            const rg = document.getElementById('regime');
            rg.innerText = d.regime;
            rg.className = `status-badge ${d.regime === 'LATERAL' ? 'bg-blue-900' : (d.regime === 'ALTA' ? 'bg-green-900' : 'bg-red-900')}`;

            if(d.hPreco) { chart.data.datasets[0].data = d.hPreco; chart.update('none'); }
            
            document.getElementById('log').innerHTML = d.transacoes.map(t => `
                <div class="flex justify-between border-b border-[#21262d] pb-1">
                    <span class="${t.tipo.includes('BUY') ? 'text-green-400' : 'text-red-400'}">${t.tipo}</span>
                    <span>${t.qtd} un @ ${t.preco.toLocaleString()}</span>
                    <span class="text-gray-600">${t.data}</span>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
