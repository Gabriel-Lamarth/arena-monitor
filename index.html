<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL v1.0 | Telemetry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'JetBrains Mono', monospace; }
        .gh-card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; position: relative; overflow: hidden; }
        .regime-bull { border-top: 4px solid #3fb950; }
        .regime-bear { border-top: 4px solid #f85149; }
        .regime-sideways { border-top: 4px solid #388bfd; }
        .chart-h { height: 400px; }
        .stat-label { font-size: 10px; color: #8b949e; font-weight: bold; text-transform: uppercase; }
        .stat-value { font-size: 20px; font-weight: 700; color: #f0f6fc; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #30363d; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <div>
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span class="text-blue-500">SENTINEL</span> v1.0 
                <span id="status-pulse" class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
            </h1>
            <p class="text-[10px] text-[#8b949e]">PREDICTIVE ENGINE / UFMG CONTROL SYSTEMS</p>
        </div>
        <div class="flex gap-4">
            <div id="market-regime" class="px-4 py-1 rounded bg-[#21262d] border border-[#30363d] text-xs font-bold">---</div>
            <div id="server-time" class="text-xs text-[#8b949e] py-1">00:00:00</div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-12 gap-4">
        
        <div class="md:col-span-3 space-y-4">
            <div class="gh-card p-4">
                <p class="stat-label">Available Balance</p>
                <div id="coins" class="stat-value text-yellow-500">---</div>
            </div>
            <div class="gh-card p-4">
                <p class="stat-label">GLUE Inventory</p>
                <div id="glues" class="stat-value text-blue-400">---</div>
            </div>
            <div class="gh-card p-4">
                <p class="stat-label">Avg. Buy Price (DCA)</p>
                <div id="avgPrice" class="stat-value">---</div>
                <div class="w-full bg-[#21262d] h-1 mt-2 rounded-full overflow-hidden">
                    <div id="rsi-bar" class="h-full bg-blue-500" style="width: 50%"></div>
                </div>
                <p class="text-[9px] text-[#8b949e] mt-1 flex justify-between">
                    <span>RSI Strength</span>
                    <span id="rsi-val">50</span>
                </p>
            </div>
        </div>

        <div class="md:col-span-9 gh-card p-2">
            <div class="flex justify-between px-4 py-2 border-b border-[#30363d] mb-2">
                <span class="text-[10px] font-bold text-[#8b949e]">REAL-TIME MARKET SPECTRUM</span>
                <span id="current-price" class="text-sm font-bold text-[#f0f6fc]">---</span>
            </div>
            <div class="chart-h">
                <canvas id="mainChart"></canvas>
            </div>
        </div>

        <div class="md:col-span-12 gh-card">
            <div class="px-4 py-2 border-b border-[#30363d] bg-[#161b22] text-[10px] font-bold flex justify-between">
                <span>EXECUTION LEDGER (v1.0)</span>
                <span class="text-blue-500">LIVE FEED</span>
            </div>
            <div id="tx-history" class="p-2 max-h-64 overflow-y-auto text-[11px]">
                </div>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCafWPTpVdi1WRIIXOmDTl7xqOzlXkkwz0",
            databaseURL: "https://arenasentinel-cc345-default-rtdb.firebaseio.com",
            projectId: "arenasentinel-cc345"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- INICIALIZAÇÃO DO GRÁFICO ---
        const ctx = document.getElementById('mainChart').getContext('2d');
        const mainChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(100).fill(''),
                datasets: [
                    { label: 'Price', data: [], borderColor: '#f0f6fc', borderWidth: 2, pointRadius: 0, tension: 0.1, z: 10 },
                    { label: 'B-Upper', data: [], borderColor: 'rgba(248, 81, 73, 0.3)', borderWidth: 1, borderDash: [5, 5], pointRadius: 0, fill: false },
                    { label: 'B-Lower', data: [], borderColor: 'rgba(63, 185, 80, 0.3)', borderWidth: 1, borderDash: [5, 5], pointRadius: 0, fill: false },
                    { label: 'EMA-Slow', data: [], borderColor: 'rgba(56, 139, 253, 0.4)', borderWidth: 1, pointRadius: 0, fill: false }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { display: false },
                    y: { position: 'right', grid: { color: '#21262d' }, ticks: { color: '#8b949e', font: { size: 10 } } }
                },
                plugins: { legend: { display: false } },
                animation: false
            }
        });

        // --- SYNC ENGINE ---
        let lastHistoryHash = "";

        db.ref('sentinel_monitor').on('value', (snap) => {
            const data = snap.val();
            if (!data) return;

            // Update Header & Regime
            const regimeEl = document.getElementById('market-regime');
            regimeEl.innerText = data.regime;
            regimeEl.className = `px-4 py-1 rounded border text-xs font-bold regime-${data.regime.toLowerCase()}`;
            document.getElementById('server-time').innerText = new Date(data.ts).toLocaleTimeString();

            // Update Stats
            document.getElementById('coins').innerText = Number(data.coins).toLocaleString();
            document.getElementById('glues').innerText = data.glues.toFixed(2);
            document.getElementById('avgPrice').innerText = data.avgPrice > 0 ? data.avgPrice.toFixed(0) : "N/A";
            document.getElementById('current-price').innerText = "C$ " + data.price.toLocaleString();
            
            // RSI Bar
            const rsiVal = parseFloat(data.rsi);
            document.getElementById('rsi-val').innerText = rsiVal.toFixed(0);
            document.getElementById('rsi-bar').style.width = rsiVal + "%";
            document.getElementById('rsi-bar').style.backgroundColor = rsiVal > 70 ? '#f85149' : (rsiVal < 30 ? '#3fb950' : '#388bfd');

            // Chart Update (Rolling window)
            const updateChart = (datasetIndex, value) => {
                const ds = mainChart.data.datasets[datasetIndex].data;
                ds.push(value);
                if (ds.length > 100) ds.shift();
            };

            updateChart(0, data.price);
            if (data.bands) {
                updateChart(1, data.bands.top);
                updateChart(2, data.bands.bot);
            }
            if (data.avgPrice) updateChart(3, data.avgPrice);
            mainChart.update('none');

            // History Update
            const historyHash = JSON.stringify(data.history);
            if (historyHash !== lastHistoryHash) {
                lastHistoryHash = historyHash;
                const container = document.getElementById('tx-history');
                container.innerHTML = data.history.map(tx => `
                    <div class="flex justify-between items-center py-2 px-4 border-b border-[#21262d] hover:bg-[#1c2128] transition-colors">
                        <div class="flex items-center gap-4">
                            <span class="font-bold ${tx.type.includes('BUY') ? 'text-green-500' : 'text-red-500'}">${tx.type}</span>
                            <span class="text-gray-300">${tx.q} units</span>
                        </div>
                        <div class="flex gap-6">
                            <span class="text-blue-400">@ ${tx.p.toLocaleString()}</span>
                            <span class="text-gray-600 w-16 text-right">${tx.t}</span>
                        </div>
                    </div>
                `).join('');
            }
        });
    </script>
</body>
</html>
