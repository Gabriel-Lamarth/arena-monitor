<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel | High-Freq Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; background: #000; color: #eee; overflow-x: hidden; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 8px; padding: 1rem; }
        .chart-box { height: 180px; width: 100%; position: relative; }
        .label-tech { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-6 border-b border-zinc-900 pb-2">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
            <h1 class="text-sm font-bold tracking-widest">SENTINEL_HF_MONITORING</h1>
        </div>
        <div id="clock" class="text-[10px] text-zinc-600">00:00:00</div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <div class="card">
            <span class="label-tech">Market Price (200 pts)</span>
            <div class="chart-box"><canvas id="chartPreco"></canvas></div>
        </div>
        <div class="card">
            <span class="label-tech text-green-500">Net Profit (Performance)</span>
            <div class="chart-box"><canvas id="chartLucro"></canvas></div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        
        <div class="card flex flex-col justify-center items-center">
            <span class="label-tech">Last Signal</span>
            <div id="vPreco" class="text-5xl font-black text-white py-4 tracking-tighter">---</div>
            <div class="flex gap-4 text-[10px]">
                <span class="text-green-500">BUY: <b id="vBuy">---</b></span>
                <span class="text-red-500">SELL: <b id="vSell">---</b></span>
            </div>
        </div>

        <div class="lg:col-span-2 card">
            <span class="label-tech mb-4 block">Transaction History</span>
            <div id="txLog" class="space-y-1 max-h-[200px] overflow-y-auto pr-2 text-[11px]">
                </div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCafWPTpVdi1WRIIXOmDTl7xqOzlXkkwz0",
            authDomain: "arenasentinel-cc345.firebaseapp.com",
            databaseURL: "https://arenasentinel-cc345-default-rtdb.firebaseio.com",
            projectId: "arenasentinel-cc345",
            storageBucket: "arenasentinel-cc345.firebasestorage.app",
            messagingSenderId: "839795085957",
            appId: "1:839795085957:web:ac787cc883563d40960fec"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // CONFIGURAÇÃO GENÉRICA PARA OS GRÁFICOS
        const chartStyle = (color) => ({
            type: 'line',
            data: { labels: Array(200).fill(''), datasets: [{ 
                data: [], borderColor: color, borderWidth: 1.5, pointRadius: 0, fill: true,
                backgroundColor: color + '10', tension: 0.2 
            }]},
            options: { 
                responsive: true, maintainAspectRatio: false, 
                animation: false,
                scales: { x: { display: false }, y: { grid: { color: '#111' }, ticks: { color: '#444', font: { size: 9 } } } },
                plugins: { legend: { display: false } }
            }
        });

        const cPreco = new Chart(document.getElementById('chartPreco'), chartStyle('#3b82f6'));
        const cLucro = new Chart(document.getElementById('chartLucro'), chartStyle('#10b981'));

        let lastTxHash = "";

        db.ref('monitor').on('value', (snap) => {
            const d = snap.val();
            if(!d) return;

            // Update Textos
            document.getElementById('vPreco').innerText = Number(d.precoAtual).toLocaleString();
            document.getElementById('vBuy').innerText = d.alvoCompra.toFixed(0);
            document.getElementById('vSell').innerText = d.alvoVenda.toFixed(0);
            document.getElementById('clock').innerText = new Date(d.lastUpdate).toLocaleTimeString();

            // Update Gráficos (200 pontos)
            if(d.hPreco) { cPreco.data.datasets[0].data = d.hPreco; cPreco.update(); }
            if(d.hLucro) { cLucro.data.datasets[0].data = d.hLucro; cLucro.update(); }

            // Log Estabilizado
            const txHash = JSON.stringify(d.transacoes);
            if(txHash !== lastTxHash) {
                lastTxHash = txHash;
                const html = d.transacoes.map(t => `
                    <div class="flex justify-between items-center bg-[#111] p-2 border-l-2 ${t.tipo === 'VENDA' ? 'border-red-500' : 'border-green-500'}">
                        <span><b>${t.tipo}</b> ${t.qtd} un @ ${t.preco.toLocaleString()}</span>
                        <span class="text-[9px] text-zinc-700">${t.data}</span>
                    </div>
                `).join('');
                document.getElementById('txLog').innerHTML = html;
            }
        });
    </script>
</body>
</html>
